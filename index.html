<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizzerv</title>
<style>
  :root{
    --bg:#100810;
    --plum:#4a2d4a;
    --plum-deep:#241324;
    --copper:#d68a52;
    --copper-deep:#b9733d;
    --copper-soft:#f4e6d8;
    --rose:#e9b89c;
    --cream:#faf6f1;
    --line:#e7ded6;
    --muted:#8a7d83;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--cream);overflow:hidden}

  #stars{position:fixed;inset:0;width:100%;height:100%;display:block;
    background:radial-gradient(130% 100% at 50% 35%, #241324 0%, #160c16 55%, #0c060c 100%);cursor:crosshair}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:flex-end;padding:24px 30px}
  .app-btn{color:rgba(250,246,241,.82);text-decoration:none;font-size:13.5px;border:1px solid rgba(250,246,241,.22);
    padding:8px 16px;border-radius:999px;transition:.18s;backdrop-filter:blur(4px)}
  .app-btn:hover{color:#fff;border-color:var(--rose);background:rgba(233,184,156,.1)}

  .tagline{position:fixed;left:0;right:0;bottom:16%;z-index:4;text-align:center;pointer-events:none;
    font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:rgba(233,184,156,.62);
    opacity:0;animation:fade 1.2s ease 1.1s forwards}
  @keyframes fade{to{opacity:1}}
  @media(max-width:600px){.tagline{bottom:20%;letter-spacing:.22em;font-size:11px}}

  /* ---------- floating support widget ---------- */
  #launch{position:fixed;bottom:24px;right:24px;z-index:50;width:62px;height:62px;border:none;border-radius:50%;
    cursor:pointer;background:linear-gradient(135deg,var(--copper),var(--copper-deep));color:#fff;
    box-shadow:0 14px 34px -8px rgba(0,0,0,.7);display:grid;place-items:center;transition:transform .2s}
  #launch:hover{transform:translateY(-2px)}
  #launch svg{width:27px;height:27px;transition:opacity .15s, transform .25s;grid-area:1/1}
  #launch .ic-close{opacity:0;transform:rotate(-45deg)}
  #launch.open .ic-chat{opacity:0;transform:rotate(45deg)}
  #launch.open .ic-close{opacity:1;transform:rotate(0)}

  .widget{position:fixed;bottom:100px;right:24px;z-index:49;width:374px;max-width:calc(100vw - 32px);
    height:600px;max-height:calc(100vh - 130px);background:var(--cream);border:1px solid var(--line);
    border-radius:22px;overflow:hidden;box-shadow:0 28px 70px -24px rgba(0,0,0,.7);color:#1c1620;
    display:flex;flex-direction:column;opacity:0;transform:translateY(16px) scale(.98);pointer-events:none;
    transition:opacity .22s ease, transform .22s ease}
  .widget.open{opacity:1;transform:none;pointer-events:auto}

  .w-head{background:var(--plum);color:#fff;padding:15px 16px;display:flex;align-items:center;gap:11px;flex:none}
  .w-back{background:rgba(255,255,255,.14);border:none;color:#fff;width:31px;height:31px;border-radius:9px;cursor:pointer;display:none;place-items:center;flex:none}
  .w-back svg{width:16px;height:16px}
  .w-back.show{display:grid}
  .w-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(140deg,var(--copper),var(--rose));display:grid;place-items:center;font-weight:700;font-size:16px;color:#fff;font-family:var(--serif);flex:none}
  .w-titles{min-width:0;flex:1}
  .w-titles h2{margin:0;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .w-titles span{font-size:12px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:6px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#67d18d;flex:none}
  .w-close{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:22px;line-height:1;padding:0 4px;flex:none}
  .w-close:hover{color:#fff}

  .w-body{flex:1;overflow-y:auto;padding:18px 15px}
  .intro{font-size:13.5px;color:#6a5c61;margin:2px 4px 16px}
  .sec-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 4px 11px}
  .list{display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;cursor:pointer;font-family:inherit;transition:border-color .15s, box-shadow .15s, transform .05s}
  .row:hover{border-color:var(--copper);box-shadow:0 6px 18px -10px rgba(74,45,74,.4)}
  .row:active{transform:scale(.995)}
  .r-ico{flex:none;width:37px;height:37px;border-radius:11px;background:var(--copper-soft);display:grid;place-items:center;font-size:18px}
  .r-text{flex:1;min-width:0}
  .r-title{font-size:14px;font-weight:600;color:var(--plum-deep)}
  .r-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .r-chev{flex:none;color:var(--copper);font-size:18px;font-weight:700;line-height:1}
  .row.q .r-dot{flex:none;width:7px;height:7px;border-radius:50%;background:var(--copper)}
  .row.q .r-title{font-weight:500;color:#1c1620}
  .answer .q-asked{font-family:var(--serif);font-size:18px;line-height:1.25;color:var(--plum-deep);margin:2px 4px 15px}
  .card{border-radius:15px;padding:15px 16px;font-size:14px;line-height:1.55;white-space:pre-wrap;background:#fff;border:1px solid var(--line)}
  .more{margin-top:18px;text-align:center}
  .more button{background:none;border:none;color:var(--copper);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
  .more button:hover{text-decoration:underline}
  .view{animation:slidein .22s ease}
  @keyframes slidein{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.tagline{animation:none;opacity:1}.view{animation:none}}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="topbar"><a href="#" class="app-btn">Get the app</a></div>
<div class="tagline">Salon &amp; stylist booking</div>

<!-- ============ FLOATING SUPPORT WIDGET ============ -->
<button id="launch" aria-label="Open support">
  <svg class="ic-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  <svg class="ic-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>

<div class="widget" id="widget" role="dialog" aria-label="Rizzerv support">
  <div class="w-head">
    <button class="w-back" id="back" aria-label="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="w-avatar">R</div>
    <div class="w-titles">
      <h2 id="w-title">Rizzerv Support</h2>
      <span id="w-sub"><i class="live-dot"></i> How can we help?</span>
    </div>
    <button class="w-close" id="close" aria-label="Close">&times;</button>
  </div>
  <div class="w-body" id="body"></div>
</div>

<script>
/* ============ STAR-PARTICLE WORDMARK "Rizzerv" ============ */
(function(){
  const canvas=document.getElementById('stars');
  const ctx=canvas.getContext('2d');
  const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PALETTE=['#faf6f1','#faf6f1','#faf6f1','#e9b89c','#d68a52','#c9a0c4'];
  let W,H,DPR,particles=[],mouse={x:-9999,y:-9999};

  function build(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=innerWidth;H=innerHeight;
    canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);

    const serif=getComputedStyle(document.body).getPropertyValue('--serif')||'Georgia, serif';
    const off=document.createElement('canvas');
    off.width=W;off.height=H;
    const o=off.getContext('2d');
    let size=Math.min(W*0.165, H*0.34);
    o.textAlign='center';o.textBaseline='middle';o.fillStyle='#fff';
    o.font='600 '+size+'px '+serif;
    while(o.measureText('Rizzerv').width > W*0.82 && size>20){
      size-=4;o.font='600 '+size+'px '+serif;
    }
    o.fillText('Rizzerv', W/2, H*0.46);
    const data=o.getImageData(0,0,W,H).data;
    const gap=Math.max(3, Math.round(size/46));
    particles=[];
    for(let y=0;y<H;y+=gap){
      for(let x=0;x<W;x+=gap){
        if(data[(y*W+x)*4+3]>128){
          particles.push({
            hx:x+(Math.random()-.5)*gap, hy:y+(Math.random()-.5)*gap,
            x:x+(Math.random()-.5)*40, y:y+(Math.random()-.5)*40,
            vx:0,vy:0,
            r:Math.random()*1.1+0.7,
            c:PALETTE[(Math.random()*PALETTE.length)|0],
            tw:Math.random()*Math.PI*2, ts:0.02+Math.random()*0.04
          });
        }
      }
    }
  }

  const R=92, R2=R*R, K=0.9;
  function frame(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      const dx=p.x-mouse.x, dy=p.y-mouse.y, d2=dx*dx+dy*dy;
      let glow=0;
      if(d2<R2){
        const d=Math.sqrt(d2)||1, f=(R2-d2)/R2;
        p.vx+=(dx/d)*f*K; p.vy+=(dy/d)*f*K; glow=f;
      }
      p.vx+=(p.hx-p.x)*0.014; p.vy+=(p.hy-p.y)*0.014;
      p.vx*=0.88; p.vy*=0.88;
      p.x+=p.vx; p.y+=p.vy;
      p.tw+=p.ts;
      const a=0.55+Math.sin(p.tw)*0.32+glow*0.6;
      ctx.globalAlpha=Math.min(1,a);
      ctx.fillStyle=p.c;
      const rr=p.r+glow*1.6;
      ctx.beginPath();ctx.arc(p.x,p.y,rr,0,6.283);ctx.fill();
    }
    ctx.globalAlpha=1;
    if(!reduce) requestAnimationFrame(frame);
  }

  addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;},{passive:true});
  addEventListener('mouseleave',()=>{mouse.x=mouse.y=-9999;});
  addEventListener('touchmove',e=>{const t=e.touches[0];if(t){mouse.x=t.clientX;mouse.y=t.clientY;}},{passive:true});
  addEventListener('touchend',()=>{mouse.x=mouse.y=-9999;});
  let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{build();if(reduce)frame();},150);});

  build();
  frame();
})();

/* ============ SUPPORT WIDGET (rule-based) ============ */
(function(){
  const RULES = {
    "reschedule":{ scripted:"To reschedule your appointment, go to My Bookings \u2192 tap the booking \u2192 select Reschedule. Changes must be made at least 2 hours before your appointment." },
    "missing":{ scripted:"Please check your registered email for a booking confirmation. If you didn't receive one, your booking may not have gone through. Try booking again or contact support." },
    "cancel-refund":{ scripted:"Cancellations made 24 hours before your appointment are eligible for a full refund. Cancellations within 24 hours may incur a fee. Go to My Bookings \u2192 Cancel to proceed." },
    "salon-cancelled":{ scripted:"If a salon cancels your appointment, you are eligible for a full refund. Please check your email for a cancellation notice. Refund will be processed within 5\u20137 business days." },
    "pay-not-confirmed":{ scripted:"This can happen due to a network issue. Please wait 10 minutes and refresh the app. If the booking still doesn't appear, contact support with your transaction ID." },
    "double-charge":{ scripted:"Please contact support with both transaction IDs and we will process a refund for the duplicate charge within 5\u20137 business days." },
    "promo":{ scripted:"Please ensure the promo code is entered before payment and hasn't expired. Some codes are valid only for first-time bookings or specific salons. Check Terms & Conditions for the offer." },
    "review-missing":{ scripted:"Reviews go through a moderation process and appear within 24\u201348 hours. If it hasn't appeared after 48 hours, please contact support." },
    "review-pressure":{ scripted:"Rizzerv does not allow salons to contact users regarding reviews. Please report this to support immediately." },
    "delete-account":{ scripted:"To delete your account, go to Profile \u2192 Settings \u2192 Delete Account. As per our Data Deletion Policy under DPDP Act 2023, your data will be permanently erased within 30 days." },
    "app-crash":{ scripted:"Please try: 1) Update the app to the latest version. 2) Clear app cache. 3) Restart your phone. If the issue continues, contact support with your device model and OS version." },
    "bad-service":{ scripted:"Rizzerv does not offer refunds after a service has been completed. If you had a poor experience, please raise a complaint and our team will mediate with the salon." },
    "stylist-different":{ scripted:"We're sorry to hear this. Please raise a complaint through the app under My Bookings \u2192 Report Issue. Our team will review and contact you within 48 hours." },
    "report-salon":{ scripted:"To report a salon, go to My Bookings \u2192 select the booking \u2192 Review Service. Our team will investigate within 3\u20135 business days." },
    "unhygienic":{ scripted:"We're sorry to hear this. Please report the salon immediately through the Review Page. Our team will investigate and take necessary action." },
    "overcharged":{ scripted:"Prices on Rizzerv are set by the salon and are subject to change. If you were charged differently, please contact the salon directly or raise a dispute through the app." }
  };
  const CATEGORIES = [
    { label:"Bookings", icon:"\uD83D\uDDD3\uFE0F", sub:"Reschedule, missing appointments", items:[
      { q:"How do I reschedule my appointment?", id:"reschedule" },
      { q:"My booking isn't showing up", id:"missing" }
    ]},
    { label:"Cancellation & refunds", icon:"\u274C", sub:"Cancelling, refund timelines", items:[
      { q:"Will I get a refund if I cancel?", id:"cancel-refund" },
      { q:"The salon cancelled on me \u2014 what now?", id:"salon-cancelled" }
    ]},
    { label:"Payments", icon:"\uD83D\uDCB3", sub:"Failed payments, charges, promos", items:[
      { q:"Payment deducted but booking not confirmed", id:"pay-not-confirmed" },
      { q:"I was charged twice for one booking", id:"double-charge" },
      { q:"My promo code didn't work", id:"promo" }
    ]},
    { label:"Reviews", icon:"\u2B50", sub:"Posting and moderation", items:[
      { q:"I submitted a review but it's not showing", id:"review-missing" },
      { q:"A salon is pressuring me to remove my review", id:"review-pressure" }
    ]},
    { label:"Account & app", icon:"\uD83D\uDCF1", sub:"Account data, app issues", items:[
      { q:"Delete my account and all my data", id:"delete-account" },
      { q:"The app keeps crashing when I book", id:"app-crash" }
    ]},
    { label:"Service complaints", icon:"\uD83E\uDE92", sub:"Bad service, hygiene, overcharging", items:[
      { q:"The service was bad \u2014 can I get a refund?", id:"bad-service" },
      { q:"Stylist did something different from what I asked", id:"stylist-different" },
      { q:"Report a salon for unprofessional behavior", id:"report-salon" },
      { q:"The salon was unhygienic", id:"unhygienic" },
      { q:"Charged me more than the app showed", id:"overcharged" }
    ]}
  ];

  const launch=document.getElementById('launch');
  const widget=document.getElementById('widget');
  const body=document.getElementById('body');
  const back=document.getElementById('back');
  const titleEl=document.getElementById('w-title');
  const subEl=document.getElementById('w-sub');
  let state={view:'cats',cat:null,item:null};

  function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
  function setHeader(title,sub,showBack){titleEl.textContent=title;subEl.innerHTML=showBack?sub:'<i class="live-dot"></i> '+sub;back.classList.toggle('show',showBack);}

  function renderCategories(){
    state={view:'cats',cat:null,item:null};
    setHeader("Rizzerv Support","How can we help?",false);
    const v=el('div','view');
    v.appendChild(el('p','intro',"Choose a topic to find your question."));
    v.appendChild(el('div','sec-label','Help topics'));
    const list=el('div','list');
    CATEGORIES.forEach((c,i)=>{
      const row=el('button','row');
      row.innerHTML='<span class="r-ico">'+c.icon+'</span><span class="r-text"><span class="r-title">'+c.label+'</span><span class="r-sub">'+c.sub+'</span></span><span class="r-chev">\u203A</span>';
      row.onclick=()=>renderQuestions(i);list.appendChild(row);
    });
    v.appendChild(list);body.replaceChildren(v);body.scrollTop=0;
  }
  function renderQuestions(i){
    state={view:'questions',cat:i,item:null};const c=CATEGORIES[i];
    setHeader(c.label,'Select your question',true);
    const v=el('div','view');v.appendChild(el('div','sec-label',c.label));
    const list=el('div','list');
    c.items.forEach(it=>{
      const row=el('button','row q');
      row.innerHTML='<span class="r-dot"></span><span class="r-text"><span class="r-title">'+it.q+'</span></span><span class="r-chev">\u203A</span>';
      row.onclick=()=>renderAnswer(i,it);list.appendChild(row);
    });
    v.appendChild(list);body.replaceChildren(v);body.scrollTop=0;
  }
  function renderAnswer(i,it){
    state={view:'answer',cat:i,item:it};
    setHeader("Answer","Here's how to sort it",true);
    const v=el('div','view answer');
    v.appendChild(el('div','q-asked',it.q));
    v.appendChild(el('div','card',null)).appendChild(document.createTextNode(RULES[it.id].scripted));
    const more=el('div','more');const b=el('button',null,'\u2039 Back to '+CATEGORIES[i].label);
    b.onclick=()=>renderQuestions(i);more.appendChild(b);v.appendChild(more);
    body.replaceChildren(v);body.scrollTop=0;
  }
  back.onclick=()=>{ state.view==='answer' ? renderQuestions(state.cat) : renderCategories(); };

  function openW(){widget.classList.add('open');launch.classList.add('open');renderCategories();}
  function closeW(){widget.classList.remove('open');launch.classList.remove('open');}
  launch.onclick=()=>widget.classList.contains('open')?closeW():openW();
  document.getElementById('close').onclick=closeW;

  renderCategories();
})();
</script>
</body>
</html>
